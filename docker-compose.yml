services:
  client:
    image: node:18-alpine
    ports: 
      - '5173:5173'
    volumes:
      - .:/workspace
    working_dir: /workspace/client
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_API_URL=http://server:5000
    command: sh -c "if [ ! -d 'node_modules' ]; then npm install; fi && npm run dev -- --host 0.0.0.0"
    
  server:
    build:
      context: .
      dockerfile: deployment/server.Dockerfile
    ports: 
      - '8000:5000'
    depends_on:
      - db
      - redis
    volumes:
      - .:/workspace
      - ./agents/custom:/workspace/agents/custom
    working_dir: /workspace
    environment:
      - PYTHONPATH=/workspace
      - SECRET_KEY=your_secret_key_here
      - API_KEY=your_api_key_here
      - STORAGE_BACKEND=local # Change to 's3' for testing s3 fallback
      - DATABASE_URL=postgresql://agency_os:password@db:5432/agency_os
      - REDIS_URL=redis://redis:6379/0
      # - S3_BUCKET_NAME=your_local_test_bucket
      # - AWS_ACCESS_KEY_ID=test
      # - AWS_SECRET_ACCESS_KEY=test
      # - AWS_DEFAULT_REGION=us-east-1
    command: uvicorn server.main:app --host 0.0.0.0 --port 5000 --reload

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: agency_os
      POSTGRES_USER: agency_os
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - agency_os_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - agency_os_redis:/data

volumes:
  agency_os_pgdata:
  agency_os_redis:
