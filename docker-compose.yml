services:
  client:
    build:
      context: ./client
      dockerfile: ../deployment/client.Dockerfile
    ports: 
      - '5173:5173'
    volumes:
      - .:/workspace
    working_dir: /workspace/client
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_API_URL=http://server:8000
    command: npm run dev -- --host 0.0.0.0
    
  server:
    build:
      context: .
      dockerfile: deployment/server.Dockerfile
    ports: 
      - '8000:5000'
    volumes:
      - .:/workspace
    working_dir: /workspace
    environment:
      - PYTHONPATH=/workspace
