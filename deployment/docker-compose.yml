version: '3.8'

services:
  backend:
    build: 
      context: ..
      dockerfile: deployment/server.Dockerfile
    ports:
      - "5001:5000"
    depends_on:
      - db
      - redis
    environment:
      - PYTHONPATH=/app
      - DATABASE_URL=postgresql://agency_os:staging_password@db:5432/agency_os
      - REDIS_URL=redis://redis:6379/0
      - ENVIRONMENT=staging
      - SECRET_KEY=staging_secret_key_12345
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}

  frontend:
    build:
      context: ../client
      dockerfile: ../deployment/client.Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL}
    ports:
      - "3000:80"
    environment:
      - VITE_API_URL=${VITE_API_URL}

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: agency_os
      POSTGRES_USER: agency_os
      POSTGRES_PASSWORD: staging_password
    volumes:
      - agency_os_pgdata_staging:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - agency_os_redis_staging:/data

volumes:
  agency_os_pgdata_staging:
  agency_os_redis_staging:
