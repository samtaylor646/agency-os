version: '3.8'

services:
  backend:
    build: 
      context: ..
      dockerfile: deployment/server.Dockerfile
    ports:
      - "5001:5000"
    volumes:
      # Persist the sqlite db
      - agency_os_data:/app/server/data
    environment:
      - PYTHONPATH=/app
      - DATABASE_URL=sqlite:////app/server/data/agency_os.db
      - ENVIRONMENT=staging
      - SECRET_KEY=staging_secret_key_12345

  frontend:
    build:
      context: ../client
      dockerfile: ../deployment/client.Dockerfile
      args:
        - VITE_API_URL=http://localhost:5001
    ports:
      - "3000:80"

volumes:
  agency_os_data:
