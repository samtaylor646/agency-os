version: '3.8'
services:
  backend:
    build: 
      context: ..
      dockerfile: deployment/server.Dockerfile
    ports:
      - "5001:5000"
    volumes:
      - ../server:/app/server
      - ../config:/app/config
      - ../agents:/app/agents
      - ../scripts:/app/scripts
    environment:
      - PYTHONPATH=/app

  frontend:
    build:
      context: ../client
      dockerfile: ../deployment/client.Dockerfile
    ports:
      - "3000:3000" # Assuming create-react-app or vite default port
    volumes:
      - ../client:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
