AWSTemplateFormatVersion: '2010-09-09'
Description: 'AgencyOS Custom Agent Storage S3 Bucket and IAM Policies'

Resources:
  AgentStorageBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: agency-os-agent-storage-prod
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LifecycleConfiguration:
        Rules:
          - Id: TransitionToIA
            Status: Enabled
            Transitions:
              - TransitionInDays: 90
                StorageClass: STANDARD_IA

  AgentStorageAccessRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: AgencyOSAgentStorageRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: eks.amazonaws.com # Assuming EKS IRSA or similar
            Action: sts:AssumeRole
      Policies:
        - PolicyName: AgencyOSAgentStoragePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt AgentStorageBucket.Arn
                  - !Sub "${AgentStorageBucket.Arn}/*"

Outputs:
  BucketName:
    Description: Name of the Agent Storage S3 Bucket
    Value: !Ref AgentStorageBucket
  RoleArn:
    Description: ARN of the IAM Role for accessing the bucket
    Value: !GetAtt AgentStorageAccessRole.Arn
