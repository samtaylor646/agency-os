apiVersion: v1
kind: ConfigMap
metadata:
  name: agency-os-config
  namespace: agency-os-prod
data:
  STORAGE_BACKEND: "s3"
  S3_BUCKET_NAME: "agency-os-agent-storage-prod"
  LOG_LEVEL: "INFO"
  ENVIRONMENT: "production"
---
apiVersion: v1
kind: Secret
metadata:
  name: agency-os-secrets
  namespace: agency-os-prod
type: Opaque
stringData:
  # In a real environment, AWS credentials should ideally use IRSA (IAM Roles for Service Accounts)
  # rather than explicit access keys. If explicit keys are needed, they would go here.
  # AWS_ACCESS_KEY_ID: "..."
  # AWS_SECRET_ACCESS_KEY: "..."
  SECRET_KEY: "replace-with-secure-secret"
