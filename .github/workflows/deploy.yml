name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Login to DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and Push Server Image
      uses: docker/build-push-action@v4
      with:
        context: .
        file: deployment/server.Dockerfile
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/agency-os-server:latest
        cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/agency-os-server:buildcache
        cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/agency-os-server:buildcache,mode=max

    - name: Build and Push Client Image
      uses: docker/build-push-action@v4
      with:
        context: ./client
        file: ./deployment/client.Dockerfile
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/agency-os-client:latest
        cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/agency-os-client:buildcache
        cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/agency-os-client:buildcache,mode=max

    - name: Deploy to Staging/Production
      run: |
        echo "Deployment script execution goes here..."
        # e.g. SSH into server, pull latest images, and run docker-compose up -d
