name: AgencyOS CI/CD
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      moto:
        image: motoserver/moto:latest
        ports:
          - 5000:5000
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r server/requirements.txt
          pip install pytest boto3 moto[server] httpx
      - name: Setup Mock S3 Bucket
        run: |
          aws --endpoint-url http://localhost:5000 s3 mb s3://agency-os-agent-storage-test
        env:
          AWS_ACCESS_KEY_ID: testing
          AWS_SECRET_ACCESS_KEY: testing
          AWS_DEFAULT_REGION: us-east-1
      - name: Run Tests (Local Storage)
        run: |
          PYTHONPATH=. SECRET_KEY=test pytest server/tests/
        env:
          STORAGE_BACKEND: local
      - name: Run Tests (S3 Storage)
        run: |
          PYTHONPATH=. SECRET_KEY=test pytest server/tests/
        env:
          STORAGE_BACKEND: s3
          S3_BUCKET_NAME: agency-os-agent-storage-test
          AWS_ACCESS_KEY_ID: testing
          AWS_SECRET_ACCESS_KEY: testing
          AWS_DEFAULT_REGION: us-east-1
          # In a real app we'd configure the boto3 client to use the moto endpoint
          # for tests, often via an environment variable that the app reads.
