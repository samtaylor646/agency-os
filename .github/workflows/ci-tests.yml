name: AgencyOS CI/CD
# Enforces Rule 15: Child Project CI Enforcement
# Runs localized test suites for client and server to capture downstream regressions
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: agency_os
          POSTGRES_PASSWORD: password
          POSTGRES_DB: agency_os
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      moto:
        image: motoserver/moto:latest
        ports:
          - 5000:5000
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r server/requirements.txt
          pip install pytest boto3 moto[server] httpx

      - name: Install Frontend dependencies
        working-directory: ./client
        run: npm ci || npm install

      - name: Run Frontend Tests
        working-directory: ./client
        run: npm run test

      - name: Setup Mock S3 Bucket
        run: |
          aws --endpoint-url http://localhost:5000 s3 mb s3://agency-os-agent-storage-test
        env:
          AWS_ACCESS_KEY_ID: testing
          AWS_SECRET_ACCESS_KEY: testing
          AWS_DEFAULT_REGION: us-east-1

      - name: Run Backend Tests (Local Storage)
        run: |
          PYTHONPATH=. SECRET_KEY=test pytest server/tests/
        env:
          STORAGE_BACKEND: local
          DATABASE_URL: postgresql://agency_os:password@localhost:5432/agency_os
          OPENAI_API_KEY: mock-openai-api-key

      - name: Run Backend Tests (S3 Storage)
        run: |
          PYTHONPATH=. SECRET_KEY=test pytest server/tests/
        env:
          STORAGE_BACKEND: s3
          DATABASE_URL: postgresql://agency_os:password@localhost:5432/agency_os
          OPENAI_API_KEY: mock-openai-api-key
          S3_BUCKET_NAME: agency-os-agent-storage-test
          AWS_ACCESS_KEY_ID: testing
          AWS_SECRET_ACCESS_KEY: testing
          AWS_DEFAULT_REGION: us-east-1
